# Shared login sub-flow for COACH accounts.
# Mirrors the auth setup pattern but uses coach credentials.
#
# Requires env vars: COACH_EMAIL, COACH_PASSWORD, TEST_ORG
#
# LoginScreen.jsx UI:
#   - Organization field: placeholder "Search your organization..."
#   - Org results dropdown: shows org.name + org.domain, tap to select
#   - Email field: placeholder "Enter your email"
#   - Password field: placeholder "Enter your password"
#   - Sign In button
#   - Coach lands on Schedule tab (not Book tab)
appId: com.occamgolf.app

---

# Wait for the login screen to load
- waitForAnimationToEnd

# Step 1: Search and select organization
- tapOn: "Search your organization..."
- eraseText: 20
- inputText: ${TEST_ORG}

# Wait for search results dropdown to appear (debounced 400ms + API call)
# Extra time needed after clearKeychain fresh start
- extendedWaitUntil:
    visible:
      id: "org-result-${TEST_ORG}"
    timeout: 30000
- tapOn:
    id: "org-result-${TEST_ORG}"
- waitForAnimationToEnd

# Dismiss keyboard by tapping a static label
- tapOn: "Organization"

# Step 2: Enter email
- tapOn: "Enter your email"
- eraseText: 50
- inputText: ${COACH_EMAIL}

# Step 3: Enter password
- tapOn: "Enter your password"
- eraseText: 50
- inputText: ${COACH_PASSWORD}

# Step 4: Sign in
- tapOn: "Sign In"

# Wait for coach home screen to load (coach lands on Dashboard with "Hello, Coach")
# Needs extra time on cold start: login API + token storage + navigation
- extendedWaitUntil:
    visible: ".*Hello.*Coach.*"
    timeout: 150000
