# Shared helper: navigate to the Caddie AI chat tab.
# Assumes user is already logged in as a client.
#
# Deep link is used because Maestro taps on React Navigation custom tab bars
# do NOT reliably trigger onPress on iOS.
appId: com.occamgolf.app

---

- openLink: "occamgolf://caddie"
- waitForAnimationToEnd

# Wait for the Caddie screen hero or input to appear
- extendedWaitUntil:
    visible: "Caddie"
    timeout: 15000
