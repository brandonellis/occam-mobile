# Shared helper: handle coach selection if shown.
# Selects the first available coach card.
# Mirrors the web test pattern of selecting Coach Alpha.
appId: host.exp.Exponent

---

- runFlow:
    when:
      visible: "Select a Coach"
    commands:
      - tapOn:
          id: "coach-selection-list"
          childOf:
            index: 0
          optional: true
      - waitForAnimationToEnd
