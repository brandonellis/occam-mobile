# Shared helper: navigate to the booking service selection screen.
# Mirrors the navigateToServiceSelection() helper in the web Playwright tests.
# Assumes user is already logged in.
appId: com.occamgolf.app

---

# Tap the "Book Session" quick action on the client home screen (by testID)
- tapOn:
    id: "book-session-button"
- waitForAnimationToEnd

# Wait for the service selection screen to load
- extendedWaitUntil:
    visible: "Select a Service"
    timeout: 15000
