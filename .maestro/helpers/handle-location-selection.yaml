# Shared helper: handle location selection if shown (multi-location service).
# Mirrors the pattern in web tests:
#   const locationCard = page.locator('.location-card').first();
#   if (await locationCard.isVisible(...)) { await locationCard.click(); }
appId: host.exp.Exponent

---

- runFlow:
    when:
      visible: "Select a Location"
    commands:
      - tapOn:
          id: "location-selection-list"
          childOf:
            index: 0
          optional: true
      - waitForAnimationToEnd
