# External Variable Duration Booking Flow
# Mirrors: occam-client/tests/e2e/external/variable-duration-booking.spec.js
#
# Tests the booking route for variable duration services (e.g., Simulator Bay Rental):
#   login → service → duration selection → timeslot → confirmation
#
# The E2E seeder creates "Simulator Bay Rental" as a variable duration service
# with allowed_durations: [60, 120, 180, 240] and base price $50/hr.
#
# Web test equivalents covered:
#   ✓ selecting a variable duration service shows duration selection step
#   ✓ duration selection shows correct price scaling
#   ✓ selecting a duration advances to timeslot selection
#   ✓ selecting a longer duration and timeslot advances to confirmation
#   ✓ full variable duration booking flow with scaled price
#
# Usage:
#   maestro test .maestro/external/variable-duration-booking.yaml \
#     -e CLIENT_EMAIL=e2e-client@occam.test \
#     -e CLIENT_PASSWORD=password \
#     -e TEST_ORG=e2e
appId: com.occamgolf.app

---

# ── Launch the app ────────────────────────────────────────────────────
- launchApp

# ── Login (skip if already logged in) ─────────────────────────────────
- runFlow:
    when:
      visible: "Sign In"
    file: ../helpers/login.yaml

# ── Ensure we're on the home screen ──────────────────────────────────
- tapOn:
    id: "tab-home"
    optional: true
- waitForAnimationToEnd

# ── Navigate to booking ────────────────────────────────────────────────
- runFlow: ../helpers/navigate-to-booking.yaml

# ── Test: selecting a variable duration service shows duration step ─────
# Mirrors: selectSimulatorService(page) → expect(durationStep).toBeVisible()
- tapOn:
    text: ".*Simulator Bay Rental.*"
- waitForAnimationToEnd

# Handle location selection if shown
- runFlow: ../helpers/handle-location-selection.yaml

# Handle coach selection if shown
- runFlow: ../helpers/handle-coach-selection.yaml

# Duration selection should appear (not directly to timeslots)
# Mirrors: const durationStep = page.locator('.duration-selection')
#          await expect(durationStep).toBeVisible()
- extendedWaitUntil:
    visible: "Select Duration"
    timeout: 15000

# ── Test: duration selection shows correct price scaling ───────────────
# Base price is $50 for 60 min.
# Mirrors: expect(oneHourCard.locator('text=/\\$50/i')).toBeVisible()
- extendedWaitUntil:
    visible: ".*\\$50.*"
    timeout: 10000

# ── Test: selecting a duration advances to timeslot selection ──────────
# Select 1-hour duration by tapping the duration card testID
- tapOn:
    id: "duration-card-60"
- waitForAnimationToEnd

# Tap Continue on duration screen
- tapOn:
    id: "duration-continue-button"
- waitForAnimationToEnd

# Should advance to timeslot selection (no coach required for Simulator Bay)
# Mirrors: await expect(timeslotSelection).toBeVisible()
- extendedWaitUntil:
    visible: "Select Date & Time"
    timeout: 15000

# Wait for time slots to load (header is uppercase)
- extendedWaitUntil:
    visible: ".*AVAILABLE TIMES.*"
    timeout: 30000

# ── Test: selecting a timeslot advances to confirmation ────────────────
# Select first available timeslot by testID
- tapOn:
    id: "time-slot-.*"
    index: 0
- waitForAnimationToEnd

# Tap Continue
- tapOn:
    id: "continue-button"
- waitForAnimationToEnd

# ── Test: confirmation shows correct price ─────────────────────────────
# Verify booking summary is visible with the correct price
# Mirrors: expect(priceText.first()).toBeVisible()
- extendedWaitUntil:
    visible: ".*Total.*"
    timeout: 15000

# Resource auto-selection should not trigger an error
# Mirrors the resource-flow test: service requires_resource → auto-assigned
- assertNotVisible:
    text: "No resources are available"
    optional: true

- assertVisible:
    id: "confirm-booking-button"

# NOTE: We stop before confirming to avoid creating a real booking.
