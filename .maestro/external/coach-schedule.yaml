# Coach Schedule Flow — coach views daily schedule, taps a booking for detail
#
# Tests:
#   ✓ coach can navigate to Schedule tab
#   ✓ schedule screen shows header and date selector
#   ✓ date picker shows day items
#   ✓ new booking button is accessible from schedule
#   ✓ session cards or empty state are shown
#
# Usage:
#   maestro test .maestro/external/coach-schedule.yaml \
#     -e COACH_EMAIL=coach.alpha@e2e-golf.test \
#     -e COACH_PASSWORD=password \
#     -e TEST_ORG=e2e
appId: com.occamgolf.app

---

# ── Launch and login ──────────────────────────────────────────────────
- launchApp

- runFlow:
    when:
      visible: "Sign In"
    file: ../helpers/login-coach.yaml

# ── Navigate to Schedule tab via deep link ────────────────────────────
- openLink: "occamgolf://coach/schedule"
- waitForAnimationToEnd

# ── Test: schedule header is visible ──────────────────────────────────
- extendedWaitUntil:
    visible: "Schedule"
    timeout: 15000

# ── Test: new booking button exists ───────────────────────────────────
- assertVisible:
    id: "new-booking-button"

# ── Test: date selector shows day items ───────────────────────────────
# The horizontal date strip shows abbreviated day names (Mon, Tue, etc.)
# At least one day item should be visible
- extendedWaitUntil:
    visible: ".*Mon.*|.*Tue.*|.*Wed.*|.*Thu.*|.*Fri.*|.*Sat.*|.*Sun.*"
    timeout: 10000

# ── Test: session cards or empty state ────────────────────────────────
# Either sessions are displayed or the empty state text appears
# The seeder creates bookings for today, so we should see session cards
- extendedWaitUntil:
    visible: ".*Session.*|.*No Sessions.*"
    timeout: 15000
